<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NestSync</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <!-- HEADER -->
  <header class="bg-indigo-600 text-white p-4 shadow-md">
    <h1 class="text-2xl font-bold">NestSync Dashboard</h1>
  </header>

  <main class="p-6 grid md:grid-cols-2 gap-6">

    <!-- FAMILY SYNC SCORE -->
    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">Family Sync Score</h2>
      <div id="syncScore" class="text-4xl font-bold text-indigo-600">82%</div>
      <p class="text-gray-500 mt-2">Based on tasks completed & shared events.</p>
    </section>

    <!-- SHARED CALENDAR -->
    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">Shared Calendar</h2>
      <ul id="calendarList" class="space-y-2">
        <li class="bg-gray-50 p-2 rounded">Soccer Practice - 5PM</li>
        <li class="bg-gray-50 p-2 rounded">Dentist - Friday</li>
      </ul>
      <button onclick="addEvent()" class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded">
        Add Event
      </button>
    </section>

    <!-- GROCERY LIST -->
    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">Shared Grocery List</h2>
      <ul id="groceryList" class="space-y-2"></ul>

      <div class="flex gap-2 mt-4">
        <input id="groceryInput" type="text" placeholder="Add item..."
          class="flex-1 border rounded px-3 py-2" />
        <button onclick="addGrocery()" class="bg-green-500 text-white px-4 py-2 rounded">
          Add
        </button>
      </div>
    </section>

    <!-- TASK TRACKER -->
    <section class="bg-white rounded-xl shadow p-6">
      <h2 class="text-xl font-semibold mb-4">Family Tasks</h2>
      <ul id="taskList" class="space-y-2"></ul>

      <div class="flex gap-2 mt-4">
        <input id="taskInput" type="text" placeholder="New task..."
          class="flex-1 border rounded px-3 py-2" />
        <button onclick="addTask()" class="bg-blue-500 text-white px-4 py-2 rounded">
          Add
        </button>
      </div>
    </section>

  </main>

  <!-- SCRIPT -->
  <script>
    // Grocery List Logic
    function addGrocery() {
      const input = document.getElementById("groceryInput");
      const list = document.getElementById("groceryList");

      if (input.value.trim() === "") return;

      const li = document.createElement("li");
      li.className = "bg-gray-50 p-2 rounded flex justify-between";
      li.innerHTML = `
        ${input.value}
        <button onclick="this.parentElement.remove()" class="text-red-500">✕</button>
      `;

      list.appendChild(li);
      input.value = "";
    }

    // Task Logic
    function addTask() {
      const input = document.getElementById("taskInput");
      const list = document.getElementById("taskList");

      if (input.value.trim() === "") return;

      const li = document.createElement("li");
      li.className = "bg-gray-50 p-2 rounded flex justify-between";
      li.innerHTML = `
        <span onclick="toggleComplete(this)" class="cursor-pointer">
          ${input.value}
        </span>
        <button onclick="this.parentElement.remove()" class="text-red-500">✕</button>
      `;

      list.appendChild(li);
      input.value = "";
      updateScore();
    }

    function toggleComplete(element) {
      element.classList.toggle("line-through");
      updateScore();
    }

    // Calendar Logic
    function addEvent() {
      const eventName = prompt("Enter event name:");
      if (!eventName) return;

      const list = document.getElementById("calendarList");
      const li = document.createElement("li");
      li.className = "bg-gray-50 p-2 rounded";
      li.textContent = eventName;

      list.appendChild(li);
    }

    // Sync Score Logic
    function updateScore() {
      const tasks = document.querySelectorAll("#taskList span");
      const completed = document.querySelectorAll("#taskList span.line-through");

      if (tasks.length === 0) return;

      const percent = Math.round((completed.length / tasks.length) * 100);
      document.getElementById("syncScore").textContent = percent + "%";
    }
  </script>

</body>
</html>
