<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NestSync</title>

<style>
:root {
  --bark: #1f1f1f;
  --sand: #d8cfc4;
  --bg: #f5f3ef;
  --text-light: #777;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
}

/* ================= SCREEN SYSTEM ================= */

.screen {
  display: none;
  height: 100vh;
}

.screen.active {
  display: flex;
  flex-direction: column;
}

/* ================= SPLASH ================= */

#splash {
  align-items: center;
  justify-content: center;
  background: var(--bark);
  color: white;
  text-align: center;
}

/* ================= SIGNUP & PAYWALL ================= */

.center-box {
  max-width: 420px;
  margin: auto;
  padding: 2rem;
}

.field-input {
  width: 100%;
  padding: 12px;
  margin-bottom: 1rem;
  box-sizing: border-box;
}

.btn-primary {
  width: 100%;
  padding: 12px;
  background: var(--bark);
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn-secondary {
  width: 100%;
  padding: 12px;
  background: #999;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-bottom: 1rem;
}

/* ================= MAIN APP ================= */

#mainApp {
  flex-direction: column;
  background: white;
}

.app-header {
  background: var(--bark);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  flex-shrink: 0;
  color: white;
}

.app-logo {
  font-size: 1.3rem;
  font-weight: 700;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.avatar-stack {
  display: flex;
}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid var(--bark);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  margin-left: -6px;
  background: var(--sand);
  color: black;
}

.avatar:first-child {
  margin-left: 0;
}

.app-content {
  padding: 2rem;
}

.plan-banner {
  background: #f3f3f3;
  padding: 10px;
  margin-bottom: 1rem;
  font-size: 0.85rem;
}
</style>
</head>
<body>

<!-- ================= SPLASH ================= -->
<div class="screen active" id="splash">
  <h1>NestSync</h1>
  <p>Organize Your Family Life</p>
</div>

<!-- ================= SIGNUP ================= -->
<div class="screen" id="signup">
  <div class="center-box">
    <h2>Create Account</h2>

    <input class="field-input" placeholder="Full Name">
    <input class="field-input" placeholder="Email">
    <input type="password" class="field-input" placeholder="Password">

    <button class="btn-primary" onclick="goToPaywall()">
      Continue
    </button>
  </div>
</div>

<!-- ================= PAYWALL ================= -->
<div class="screen" id="paywall">
  <div class="center-box">
    <h2>Choose Your Plan</h2>
    <p style="color:var(--text-light);margin-bottom:2rem;">
      Premium includes a 7-day free trial.
    </p>

    <button class="btn-secondary" onclick="chooseFree()">
      Continue Free
    </button>

    <button class="btn-primary" onclick="startTrial()">
      Premium — $7.99/month<br>
      Includes 7-Day Free Trial
    </button>
  </div>
</div>

<!-- ================= MAIN APP ================= -->
<div class="screen" id="mainApp">

  <div class="app-header">
    <div class="app-logo">NestSync</div>

    <div class="header-right">
      <div class="avatar-stack">
        <div class="avatar">A</div>
        <div class="avatar">B</div>
        <div class="avatar">C</div>
      </div>
    </div>
  </div>

  <div class="app-content">
    <div id="planBanner" class="plan-banner"></div>

    <h3>Family Dashboard</h3>
    <p>Your family organization hub is ready.</p>
  </div>

</div>

<script>

/* ================= SCREEN NAVIGATION ================= */

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

/* ================= FLOW LOGIC ================= */

document.addEventListener("DOMContentLoaded", function() {

  const plan = localStorage.getItem("plan");

  showScreen("splash");

  setTimeout(() => {

    if (!plan) {
      showScreen("signup");
    } else {
      checkTrialStatus();
      showScreen("mainApp");
      updateBanner();
    }

  }, 2500);
});

function goToPaywall() {
  showScreen("paywall");
}

function chooseFree() {
  localStorage.setItem("plan", "free");
  showScreen("mainApp");
  updateBanner();
}

function startTrial() {
  const trialEnd = new Date();
  trialEnd.setDate(trialEnd.getDate() + 7);

  localStorage.setItem("plan", "pro_trial");
  localStorage.setItem("trialEnds", trialEnd.toISOString());

  showScreen("mainApp");
  updateBanner();
}

/* ================= TRIAL LOGIC ================= */

function checkTrialStatus() {
  const plan = localStorage.getItem("plan");
  const trialEnds = localStorage.getItem("trialEnds");

  if (plan === "pro_trial" && trialEnds) {
    const now = new Date();
    const end = new Date(trialEnds);

    if (now > end) {
      localStorage.setItem("plan", "free");
      localStorage.removeItem("trialEnds");
    }
  }
}

function updateBanner() {
  const banner = document.getElementById("planBanner");
  const plan = localStorage.getItem("plan");
  const trialEnds = localStorage.getItem("trialEnds");

  if (plan === "pro_trial" && trialEnds) {
    const now = new Date();
    const end = new Date(trialEnds);
    const daysLeft = Math.ceil((end - now) / (1000 * 60 * 60 * 24));

    banner.innerText = "Premium Trial — " + daysLeft + " days remaining.";
  } else if (plan === "free") {
    banner.innerText = "Free Plan";
  } else {
    banner.innerText = "";
  }
}

</script>

</body>
</html>
